<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HYDRA OSINT | TIUE TERM</title>
    <style>
        :root { --green: #00ff41; --red: #ff003c; --bg: #010a0f; }
        body { background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; padding: 20px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border: 1px solid #1a3a3a; padding: 15px; background: rgba(2, 17, 23, 0.8); }
        .card-label { color: var(--red); font-size: 11px; margin-bottom: 10px; display: block; }
        .input-row { display: flex; border: 1px solid var(--green); background: #000; }
        input { background: transparent; border: none; color: var(--green); padding: 12px; flex-grow: 1; outline: none; font-family: inherit; }
        .btn { background: var(--green); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        #display { border: 1px solid var(--green); background: #000; margin-top: 20px; padding: 20px; min-height: 200px; }
        #auth-box, #main-ui { display: none; }
        #auth-box { border: 1px solid var(--green); width: 350px; margin: 100px auto; padding: 20px; text-align: center; display: block; }
    </style>
</head>
<body>

<div id="auth-box">
    <h2 style="color:var(--red)">// LOGIN REQUIRED</h2>
    <input type="text" id="user" placeholder="LOGIN" style="width:90%; border:1px solid var(--green); margin-bottom:10px;">
    <input type="password" id="pass" placeholder="PASS" style="width:90%; border:1px solid var(--green); margin-bottom:10px;">
    <button class="btn" onclick="auth('login')" style="width:95%">ENTER</button>
</div>

<div id="main-ui">
    <div style="text-align:center; color:var(--green); letter-spacing:10px; margin-bottom:20px;">HYDRA OSINT v8.0</div>
    <div class="grid">
        <div class="card"><span class="card-label">// SHERLOCK</span><div class="input-row"><input id="t-nick"><button class="btn" onclick="scan('nick')">GO</button></div></div>
        <div class="card"><span class="card-label">// IP TRACE</span><div class="input-row"><input id="t-ip"><button class="btn" onclick="scan('ip')">GO</button></div></div>
        <div class="card"><span class="card-label">// CRYPTO</span><div class="input-row"><input id="t-crypto"><button class="btn" onclick="scan('crypto')">GO</button></div></div>
        <div class="card"><span class="card-label">// PHOTO SCANNER (GPS)</span><div class="input-row"><input type="file" id="t-photo" style="font-size:10px;"><button class="btn" onclick="uploadPhoto()">SCAN</button></div></div>
    </div>
    <div id="display">> СИСТЕМА ГОТОВА...</div>
</div>

<script>
    async function auth(type) {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const r = await fetch(`/api/${type}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
        const d = await r.json();
        if(d.status==='success') { document.getElementById('auth-box').style.display='none'; document.getElementById('main-ui').style.display='block'; }
    }

    async function uploadPhoto() {
        const file = document.getElementById('t-photo').files[0];
        if(!file) return;
        const formData = new FormData(); formData.append('image', file);
        const disp = document.getElementById('display');
        disp.innerHTML = "> АНАЛИЗ МЕТАДАННЫХ ФОТО...";
        const r = await fetch('/api/photo', {method:'POST', body:formData});
        const j = await r.json();
        if(j.status==='success') disp.innerHTML = `> ЦЕЛЬ НАЙДЕНА: LAT ${j.lat}, LON ${j.lon}<br><a href="https://www.google.com/maps?q=${j.lat},${j.lon}" target="_blank" style="color:yellow">ОТКРЫТЬ НА КАРТЕ</a>`;
        else disp.innerHTML = `> ${j.msg}`;
    }

    async function scan(mode) {
        const val = document.getElementById('t-'+mode).value;
        const r = await fetch(`/api/${mode}?target=${val}`);
        const j = await r.json();
        document.getElementById('display').innerHTML = JSON.stringify(j, null, 2);
    }
</script>
</body>
</html>
