<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HYDRA OSINT | TIUE TERM</title>
    <style>
        :root { --green: #00ff41; --red: #ff003c; --bg: #010a0f; }
        body { background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; padding: 20px; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { border: 1px solid #1a3a3a; padding: 10px; background: rgba(2, 17, 23, 0.8); }
        .card-label { color: var(--red); font-size: 10px; margin-bottom: 5px; display: block; font-weight: bold; }
        .input-row { display: flex; border: 1px solid var(--green); background: #000; }
        input { background: transparent; border: none; color: var(--green); padding: 10px; flex-grow: 1; outline: none; font-family: inherit; }
        .btn { background: var(--green); color: #000; border: none; padding: 10px; cursor: pointer; font-weight: bold; }
        #display { border: 1px solid var(--green); background: #000; margin-top: 20px; padding: 15px; min-height: 200px; font-size: 13px; }
        .res-item { display: flex; justify-content: space-between; background: #021117; margin: 5px 0; padding: 5px; border-left: 2px solid var(--red); }
        .copy-btn { background: #333; color: #fff; border: 1px solid var(--green); font-size: 10px; cursor: pointer; }
        #auth-box { border: 1px solid var(--green); width: 300px; margin: 100px auto; padding: 20px; text-align: center; }
    </style>
</head>
<body>

<div id="auth-box">
    <h2 style="color:var(--red)">// ACCESS REQUIRED</h2>
    <input type="text" id="user" placeholder="LOGIN" style="width:90%; border:1px solid var(--green); margin-bottom:5px;">
    <input type="password" id="pass" placeholder="PASS" style="width:90%; border:1px solid var(--green); margin-bottom:5px;">
    <button class="btn" onclick="auth('login')" style="width:95%">ENTER</button>
</div>

<div id="main-ui" style="display:none">
    <div style="text-align:center; color:var(--green); letter-spacing:5px; margin-bottom:20px;">HYDRA SYSTEM v10.0</div>
    <div class="grid">
        <div class="card"><span class="card-label">// TG DEEP SCAN (USER/PHONE)</span><div class="input-row"><input id="t-tg"><button class="btn" onclick="scanDeep()">SCAN</button></div></div>
        <div class="card"><span class="card-label">// SHERLOCK</span><div class="input-row"><input id="t-nick"><button class="btn" onclick="scan('nick')">GO</button></div></div>
        <div class="card"><span class="card-label">// IP TRACE</span><div class="input-row"><input id="t-ip"><button class="btn" onclick="scan('ip')">GO</button></div></div>
        <div class="card"><span class="card-label">// PHONE INFO</span><div class="input-row"><input id="t-mail"><button class="btn" onclick="scan('mail')">GO</button></div></div>
        <div class="card"><span class="card-label">// PHOTO GPS</span><div class="input-row"><input type="file" id="t-photo"><button class="btn" onclick="uploadPhoto()">SCAN</button></div></div>
        <div class="card"><span class="card-label">// ADMIN PANEL</span><button class="btn" id="adm-btn" style="width:100%; display:none" onclick="openAdmin()">OPEN</button></div>
    </div>
    <div id="display">> ЖДУ ВВОДА...</div>
</div>

<script>
    function copy(t) { navigator.clipboard.writeText(t); alert('COPIED!'); }
    
    async function auth(t) {
        const u = document.getElementById('user').value, p = document.getElementById('pass').value;
        const r = await fetch(`/api/${t}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
        const d = await r.json();
        if(d.status==='success') {
            document.getElementById('auth-box').style.display='none';
            document.getElementById('main-ui').style.display='block';
            if(u==='abu') document.getElementById('adm-btn').style.display='block';
        }
    }

    async function scanDeep() {
        const t = document.getElementById('t-tg').value, disp = document.getElementById('display');
        disp.innerHTML = "> ГЛУБОКОЕ СКАНИРОВАНИЕ TELEGRAM...";
        const r = await fetch(`/api/tg_deep?target=${t}`);
        const j = await r.json();
        disp.innerHTML = "";
        j.found.forEach(s => {
            disp.innerHTML += `<div class="res-item"><span>${s.name}</span><button class="copy" onclick="copy('${s.url}')">COPY</button></div>`;
        });
    }

    async function scan(m) {
        const t = document.getElementById('t-'+m).value, disp = document.getElementById('display');
        const r = await fetch(`/api/${m}?target=${t}`);
        const j = await r.json();
        disp.innerHTML = JSON.stringify(j, null, 2);
    }
</script>
</body>
</html>
