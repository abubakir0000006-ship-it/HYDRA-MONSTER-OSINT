<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HYDRA OSINT | TIUE TERM</title>
    <style>
        :root { --green: #00ff41; --red: #ff003c; --bg: #010a0f; --card-bg: #021117; }
        body { background: var(--bg); color: var(--green); font-family: 'Courier New', monospace; margin: 0; padding: 20px; text-transform: uppercase; }
        
        /* Авторизация */
        #auth-box { border: 1px solid var(--green); background: var(--card-bg); width: 350px; margin: 100px auto; padding: 20px; text-align: center; box-shadow: 0 0 20px #000; }
        .auth-input { background: transparent; border: 1px solid var(--green); color: var(--green); padding: 10px; margin: 5px 0; width: 90%; outline: none; }
        .auth-btn { background: var(--green); color: #000; border: none; padding: 10px; width: 97%; cursor: pointer; font-weight: bold; margin-top: 10px; }

        /* Интерфейс */
        #main-ui { display: none; max-width: 1000px; margin: auto; }
        .system-title { color: var(--green); font-size: 24px; letter-spacing: 10px; margin-bottom: 30px; text-align: center; border-bottom: 1px solid var(--green); padding-bottom: 10px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { border: 1px solid #1a3a3a; padding: 15px; background: rgba(2, 17, 23, 0.8); transition: 0.3s; }
        .card:hover { border-color: var(--green); box-shadow: 0 0 10px rgba(0,255,65,0.2); }
        .card-label { color: var(--red); font-size: 11px; margin-bottom: 10px; display: block; font-weight: bold; }
        
        .input-row { display: flex; border: 1px solid var(--green); background: #000; }
        input.tool-input { background: transparent; border: none; color: var(--green); padding: 12px; flex-grow: 1; outline: none; font-family: inherit; }
        
        .btn { background: var(--green); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; min-width: 90px; }
        .btn:hover { background: #fff; }
        .btn-red { background: var(--red); color: #fff; }

        /* Вывод данных */
        #display { border: 1px solid var(--green); background: #000; margin-top: 30px; padding: 20px; min-height: 300px; font-size: 14px; overflow-y: auto; color: var(--green); line-height: 1.4; }
        .json-key { color: #fff; }
        .json-val { color: var(--green); }
        .link-res { color: yellow; text-decoration: none; display: block; margin: 5px 0; border-left: 2px solid var(--red); padding-left: 10px; }

        #map-container { margin-top: 15px; display: none; border: 1px solid var(--green); border-radius: 2px; overflow: hidden; }
        #admin-ui { display: none; }
        .user-log { color: #00ff41; border: 1px solid #1a3a3a; padding: 10px; margin-bottom: 5px; font-size: 12px; background: #01161e; }
    </style>
</head>
<body>

<div id="auth-box">
    <h2 style="color:var(--red)">// ACCESS REQUIRED</h2>
    <input type="text" id="user" class="auth-input" placeholder="LOGIN">
    <input type="password" id="pass" class="auth-input" placeholder="PASS">
    <button class="auth-btn" onclick="auth('login')">ENTER SYSTEM</button>
    <button class="auth-btn" onclick="auth('register')" style="background:#111; color:var(--green); border:1px solid var(--green);">REGISTER</button>
</div>

<div id="main-ui">
    <div class="system-title">HYDRA OSINT SYSTEM</div>

    <div class="grid">
        <div class="card">
            <span class="card-label">// ШЕРЛОК (НИКНЕЙМ)</span>
            <div class="input-row">
                <input type="text" id="target-nick" class="tool-input" placeholder="username...">
                <button class="btn" onclick="scan('nick')">ПОИСК</button>
            </div>
        </div>

        <div class="card">
            <span class="card-label">// ТРАССИРОВКА IP</span>
            <div class="input-row">
                <input type="text" id="target-ip" class="tool-input" placeholder="8.8.8.8">
                <button class="btn" onclick="scan('ip')">СЛЕДИТЬ</button>
            </div>
        </div>

        <div class="card">
            <span class="card-label">// CRYPTO CHECKER (BTC)</span>
            <div class="input-row">
                <input type="text" id="target-crypto" class="tool-input" placeholder="Address...">
                <button class="btn btn-red" onclick="scan('crypto')">CHECK</button>
            </div>
        </div>

        <div class="card">
            <span class="card-label">// DATA BREACH (EMAIL/PHONE)</span>
            <div class="input-row">
                <input type="text" id="target-mail" class="tool-input" placeholder="target...">
                <button class="btn" onclick="scan('mail')">BREACH</button>
            </div>
        </div>
    </div>

    <button id="admin-btn" onclick="openAdmin()" style="display:none; background: #0044ff; color: #fff; border: none; padding: 10px; width: 100%; margin-top: 20px; cursor: pointer; font-weight: bold; font-family: inherit;">[ OPEN MASTER ADMIN PANEL ]</button>

    <div id="display">> Жду команду ...</div>
    <div id="map-container"><img id="map-img" src="" style="width:100%;"></div>
</div>

<div id="admin-ui">
    <div class="system-title" style="color:var(--red)">USER DATABASE MONITOR</div>
    <div id="user-list"></div>
    <button class="btn" onclick="location.reload()" style="margin-top:20px; width:100%;">BACK TO TERMINAL</button>
</div>

<script>
    async function auth(type) {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const r = await fetch(`/api/${type}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        const d = await r.json();
        if(d.status === 'success') {
            if(type === 'login') {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                if(u === 'abu') document.getElementById('admin-btn').style.display = 'block';
            } else alert('Registered!');
        } else alert(d.message);
    }

    async function scan(mode) {
        let val = "";
        if(mode === 'nick') val = document.getElementById('target-nick').value;
        if(mode === 'ip') val = document.getElementById('target-ip').value;
        if(mode === 'crypto') val = document.getElementById('target-crypto').value;
        if(mode === 'mail') val = document.getElementById('target-mail').value;

        const disp = document.getElementById('display');
        const mapCont = document.getElementById('map-container');
        mapCont.style.display = "none";
        
        disp.innerHTML += `<br><br>> Запрос к /${mode}_global...<br>{`;

        try {
            const r = await fetch(`/api/${mode}?target=${val}`);
            const j = await r.json();
            
            if(mode === 'ip') {
                disp.innerHTML += `<br>  "<span class="json-key">City</span>": "<span class="json-val">${j.city}</span>",`;
                disp.innerHTML += `<br>  "<span class="json-key">Country</span>": "<span class="json-val">${j.country}</span>",`;
                disp.innerHTML += `<br>  "<span class="json-key">ISP</span>": "<span class="json-val">${j.isp}</span>"`;
                document.getElementById('map-img').src = `https://static-maps.yandex.ru/1.x/?ll=${j.lon},${j.lat}&size=600,300&z=12&l=sat,skl`;
                mapCont.style.display = "block";
            } else if(mode === 'nick') {
                disp.innerHTML += `<br>  "<span class="json-key">Status</span>": "Found",<br>  "<span class="json-key">Results</span>": [`;
                j.found.forEach(s => {
                    disp.innerHTML += `<a href="${s.url}" target="_blank" class="link-res">🔗 ${s.name}: ${s.url}</a>`;
                });
                disp.innerHTML += `  ]`;
            } else if(mode === 'crypto') {
                disp.innerHTML += `<br>  "<span class="json-key">BTC_Balance</span>": "<span class="json-val">${j.balance}</span>",`;
                disp.innerHTML += `<br>  "<span class="json-key">Transactions</span>": "${j.txs}"`;
            } else {
                disp.innerHTML += `<br>  "<span class="json-key">Risk</span>": "High",<br>  "<span class="json-key">Database</span>": "${j.leaks}"`;
            }
            disp.innerHTML += `<br>}`;
        } catch(e) { disp.innerHTML += `<br>  "Error": "Target not found"<br>}`; }
        disp.scrollTop = disp.scrollHeight;
    }

    async function openAdmin() {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('admin-ui').style.display = 'block';
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        const list = document.getElementById('user-list');
        list.innerHTML = "";
        users.forEach(u => {
            list.innerHTML += `<div class="user-log">ID: ${u.id} | USER: ${u.username} | PASS: ${u.password}</div>`;
        });
    }
</script>
</body>
</html>
