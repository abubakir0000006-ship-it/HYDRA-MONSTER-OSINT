<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>HYDRA OSINT v7.0 [PRIVATE]</title>
    <style>
        :root { --neon: #ff003c; --text: #0f0; }
        body { background: #000; color: var(--text); font-family: 'Courier New', monospace; text-align: center; margin: 0; }
        .box { border: 2px solid var(--neon); background: rgba(0,0,0,0.9); padding: 30px; width: 400px; margin: 100px auto; box-shadow: 0 0 20px var(--neon); }
        input { background: #111; border: 1px solid var(--neon); color: var(--text); padding: 10px; margin: 10px 0; width: 90%; }
        button { background: var(--neon); color: #fff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; width: 95%; }
        #main-ui, #admin-ui { display: none; padding: 20px; }
        .user-row { border-bottom: 1px solid #333; padding: 5px; color: yellow; }
    </style>
</head>
<body>

<div id="auth-box" class="box">
    <h2 style="color:var(--neon)">ACCESS RESTRICTED</h2>
    <input type="text" id="user" placeholder="USERNAME">
    <input type="password" id="pass" placeholder="PASSWORD">
    <button onclick="auth('login')">LOGIN</button>
    <button onclick="auth('register')" style="margin-top:5px; background:#333;">REGISTER</button>
    <p id="auth-msg"></p>
</div>

<div id="main-ui">
    <h1 style="color:var(--neon)">WELCOME TO HYDRA, <span id="u-name"></span></h1>
    <div class="box" style="margin: 20px auto; width: 600px;">
        <input type="text" id="target" placeholder="TARGET IP / NICK">
        <button onclick="scan('ip')">IP TRACE</button>
        <button onclick="scan('nick')" style="margin-top:5px;">NICK SCAN</button>
        <button id="admin-btn" onclick="openAdmin()" style="display:none; margin-top:20px; background:blue;">OPEN ADMIN PANEL</button>
        <div id="res" style="margin-top:20px; text-align:left;"></div>
    </div>
</div>

<div id="admin-ui">
    <h2 style="color:blue">ADMIN: USER MONITOR</h2>
    <div id="user-list" class="box" style="width:500px;"></div>
    <button onclick="location.reload()">BACK</button>
</div>

<script>
    async function auth(type) {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        const res = await fetch(`/api/${type}`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: u, password: p})
        });
        const data = await res.json();
        if(data.status === 'success') {
            if(type === 'login') showMain(u);
            else alert('Registered! Now Login.');
        } else { document.getElementById('auth-msg').innerText = data.message; }
    }

    function showMain(name) {
        document.getElementById('auth-box').style.display = 'none';
        document.getElementById('main-ui').style.display = 'block';
        document.getElementById('u-name').innerText = name;
        if(name === 'abu') document.getElementById('admin-btn').style.display = 'block';
    }

    async function scan(mode) {
        const t = document.getElementById('target').value;
        const r = await fetch(`/api/${mode}?target=${t}`);
        const d = await r.json();
        document.getElementById('res').innerText = JSON.stringify(d, null, 2);
    }

    async function openAdmin() {
        document.getElementById('main-ui').style.display = 'none';
        document.getElementById('admin-ui').style.display = 'block';
        const res = await fetch('/api/admin/users');
        const users = await res.json();
        const list = document.getElementById('user-list');
        list.innerHTML = '<b>ID | USERNAME | PASSWORD</b><br>';
        users.forEach(u => {
            list.innerHTML += `<div class="user-row">${u.id} | ${u.username} | ${u.password}</div>`;
        });
    }
</script>
</body>
</html>
